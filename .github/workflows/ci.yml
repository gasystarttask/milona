# Milona CI — Phase 6 hardening (ROADMAP.md "Phase 6 — Hardening & scale-out").
#
# This is the automated version of the local validation loop documented in
# CONTRIBUTING.md. If you change one, change the other.
#
# Jobs:
#   - lint:      cargo fmt --check, cargo clippy --workspace --all-targets -- -D warnings
#   - test:      cargo test --workspace (against a real, replica-set-enabled MongoDB
#                service container, per ROADMAP.md Phase 2 $vectorSearch/$graphLookup/
#                change-stream testing note)
#   - supply-chain: cargo audit (RUSTSEC advisories) + cargo deny (advisories + licenses +
#                bans + sources), per ROADMAP.md Key Risk #5 (rmcp RUSTSEC-2026-0189) and
#                the Phase 0 / licensing-note requirement that this fail the build
#                automatically rather than relying on manual discovery.
#
# Supply-chain job failure semantics: `cargo audit` and `cargo deny check` both exit
# non-zero on any matching advisory/license/ban violation, which fails the job and the
# required check — no separate "notify only" step is needed.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & target dir
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (workspace + MongoDB replica set)
    runs-on: ubuntu-latest
    # Not using the `services:` block here: GitHub Actions' `services:` only
    # lets you set docker-run *options* (health-cmd, ports, ...), not override
    # the container's entrypoint args. `mongo:7`'s default entrypoint starts a
    # plain standalone node with no way to pass `--replSet` through
    # `services:.options`, which is exactly the "not started with replication
    # enabled" failure this replaces. Running the container via a plain
    # `docker run` step gives full control over its command, matching
    # docker-compose.yml's `command: ["--replSet", "rs0", "--bind_ip_all"]`.
    env:
      MONGODB_URI: mongodb://127.0.0.1:27017/?directConnection=true&replicaSet=rs0

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target dir
        uses: Swatinem/rust-cache@v2

      - name: Start MongoDB single-node replica set
        run: |
          docker run -d --name milona-mongodb -p 27017:27017 mongo:7 \
            --replSet rs0 --bind_ip_all

          # Wait for the server to accept connections before initiating.
          for i in $(seq 1 30); do
            docker exec milona-mongodb mongosh --quiet --eval 'db.adminCommand({ping: 1})' \
              && break
            sleep 1
          done

          docker exec milona-mongodb mongosh --quiet --eval \
            'rs.initiate({_id: "rs0", members: [{_id: 0, host: "127.0.0.1:27017"}]})'

          # Wait for the node to become PRIMARY before tests connect.
          for i in $(seq 1 30); do
            state=$(docker exec milona-mongodb mongosh --quiet --eval 'rs.status().myState' || echo 0)
            [ "$state" = "1" ] && break
            sleep 1
          done

      - name: cargo test --workspace
        run: cargo test --workspace --all-features

  supply-chain:
    name: cargo audit + cargo deny
    runs-on: ubuntu-latest
    # rustsec/audit-check publishes its results as a GitHub Check Run, which needs
    # `checks: write` on the job's token — the default `GITHUB_TOKEN` permissions
    # (read-only on public repos, or org-restricted) don't include it, which is what
    # produced "Resource not accessible by integration" here. `contents: read` is the
    # baseline actions/checkout needs and isn't implied once `permissions:` is set
    # explicitly (GitHub drops every unlisted scope to `none`).
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & target dir
        uses: Swatinem/rust-cache@v2

      - name: cargo audit (RUSTSEC advisories)
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo deny check (advisories, licenses, bans, sources)
        run: cargo deny check
